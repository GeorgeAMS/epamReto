# Fly.io — API en contenedor (raíz del repo = Dockerfile).
# Pasos: fly auth login → fly apps create pokedex-arcana-api (o renombra `app`)
# → fly secrets set GROQ_API_KEY=... GEMINI_API_KEY=... → Qdrant cloud en QDRANT_URL
# → fly secrets set API_CORS_ORIGINS=https://pokedex-arcana-frontend.vercel.app
# → fly deploy

app = "pokedex-arcana-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
