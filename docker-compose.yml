services:
  ollama:
    image: ollama/ollama:latest
    container_name: pokedex-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pokedex-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  langfuse-db:
    image: postgres:15
    container_name: pokedex-langfuse-db
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: pokedex-langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: pokedex-arcana-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3001
      SALT: pokedex-arcana-salt
    restart: unless-stopped

  # FastAPI — mismo stack que `uv run` pero con imagen reproducible.
  # Requiere `.env` en la raíz (copia desde `.env.example`). CORS: ajusta API_CORS_ORIGINS.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pokedex-api
    ports:
      - "18001:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://ollama:11434
      LANGFUSE_HOST: http://langfuse:3000
      DUCKDB_PATH: /app/data/pokedex.duckdb
      POKEAPI_CACHE_PATH: /app/data/cache/pokeapi.sqlite
      REPORTS_DIR: /app/reports
    volumes:
      - api_data:/app/data
      - api_reports:/app/reports
    depends_on:
      - qdrant
      - ollama
      - langfuse
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  langfuse_db:
  api_data:
  api_reports:
