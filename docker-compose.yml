version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: pokedex-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pokedex-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  langfuse-db:
    image: postgres:15
    container_name: pokedex-langfuse-db
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: pokedex-langfuse
    depends_on:
      - langfuse-db
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: pokedex-arcana-secret-change-in-prod
      NEXTAUTH_URL: http://localhost:3001
      SALT: pokedex-arcana-salt
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  langfuse_db:
