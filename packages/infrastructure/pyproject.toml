[project]
name = "pokedex-infrastructure"
version = "0.1.0"
description = "Adaptadores: PokéAPI, Qdrant, ingesta, observabilidad"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pokedex-shared",
    "pokedex-domain",
    "httpx>=0.27,<1",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.5,<3",
    "python-dotenv>=1.0,<2",
    "diskcache>=5.6,<6",
    "duckdb>=1.1,<2",
    "pandas>=2.2,<3",
    "qdrant-client>=1.12,<2",
    "tenacity>=9.0,<10",
    "typer>=0.13,<1",
    "rich>=13.9,<14",
    "openai>=1.50,<2",
    "beautifulsoup4>=4.12,<5",
    "structlog>=24.4,<26",
]

[project.optional-dependencies]
observability = [
    "langfuse>=2.50,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infrastructure"]
