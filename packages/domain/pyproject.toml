[project]
name = "pokedex-domain"
version = "0.1.0"
description = "Núcleo de dominio Pokémon: entidades, value objects y reglas puras"
requires-python = ">=3.11,<3.13"

# IMPORTANTE: el dominio solo depende de stdlib + pydantic + shared.
# Ningún import de httpx, openai, fastapi, langgraph aquí.
dependencies = [
    "pydantic>=2.9,<3",
    "pokedex-shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/domain"]
