[project]
name = "pokedex-shared"
version = "0.1.0"
description = "Tipos, errores y logging compartidos entre paquetes"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pydantic>=2.9,<3",
    "structlog>=24.4,<26",
    "python-dotenv>=1.0,<2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
