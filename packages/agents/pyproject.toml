[project]
name = "pokedex-agents"
version = "0.1.0"
description = "Capa de aplicación: agentes IA (LangGraph) y orquestación"
requires-python = ">=3.11,<3.13"
dependencies = [
    "pokedex-shared",
    "pokedex-domain",
    "pokedex-infrastructure",
    "pydantic>=2.9,<3",
    "anthropic>=0.39,<1",
    "langgraph>=0.2.50,<0.4",
    "langchain-core>=0.3.20,<0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agents"]
